enabled_categories:
  type: list
  list_type: category
  default: ""
  description: "Choose which categories that users need to sign up for."
enabled_tags:
  type: list
  list_type: tag
  default: ""
  description: "Choose which tags that users need to sign up for. The default is 'gated'."
enabled_groups:
  type: list
  list_type: group
  default: ""
  description: "Choose which groups users need to be a member of to view the content. Leave empty to allow all logged-in users."
group_custom_button_link:
  type: string
  default: ""
  description: "Optionally specify a custom URL for the call-to-action button for groups."

# ——— 遮罩内容展示 ———
content_visible_height:
  type: integer
  default: 50
  min: 10
  max: 90
  description: "帖子内容在遮罩下可见的高度百分比（相对视口高度 vh），默认 50"

show_subscription_plans:
  type: boolean
  default: true
  description: "是否在遮罩 CTA 区域展示订阅计划列表（名称 + 类型 + 价格）"

plan_display_product_id:
  type: string
  default: ""
  description: "要在遮罩中展示价格的 Discourse Subscriptions 产品 ID（填写后从 /s/:id API 拉取计划列表，留空则不显示价格）"

toc_dim_opacity:
  type: integer
  default: 40
  min: 10
  max: 80
  description: "遮罩激活时，右侧目录（topic-navigation）的透明度百分比，默认 40%"

gate_overlay_bg_color:
  type: string
  default: "#EAF3FB"
  description: "遮罩背景色（支持任意 CSS 颜色值，例如 #EAF3FB 或 rgba(234,243,251,1)）"

# ——— 文案配置（D1：在后台直接可改，不需要碰代码）———
heading_text_custom:
  type: string
  default: "此内容仅限订阅会员查看"
  description: "遮罩标题文字"

subheading_text_custom:
  type: string
  default: "订阅后即可阅读全部课程内容。"
  description: "遮罩副标题（未登录用户看到）"

group_subheading_text_custom:
  type: string
  default: "您需要有效订阅才能查看此内容。"
  description: "遮罩副标题（已登录但未订阅用户看到）"

signup_cta_label_custom:
  type: string
  default: "立即订阅"
  description: "未登录用户看到的主按钮文案"

group_cta_label_custom:
  type: string
  default: "前往订阅"
  description: "已登录未订阅用户看到的主按钮文案"

login_cta_label_custom:
  type: string
  default: "已有账户？登录"
  description: "未登录用户看到的次级登录链接文案"

# ——— 订阅跳转 ———
subscription_page_url:
  type: string
  default: "/s"
  description: "订阅页面 URL，CTA 按钮跳转目标（默认 /s 为 Discourse Subscriptions 插件主页）"

subscription_product_id:
  type: string
  default: ""
  description: "（可选）若填写 Stripe Product ID，CTA 按钮将直接跳转至 /s/:product_id，跳过产品列表页"

redirect_after_login:
  type: boolean
  default: true
  description: "用户登录后是否自动跳回触发遮罩的原帖子页面（true = 跳回原页，false = 跳到首页）"

skip_gate_for_logged_in:
  type: boolean
  default: false
  description: "C1 开关：是否允许所有已登录用户绕过遮罩（true = 已登录即可看内容；false = 必须在 enabled_groups 中才能查看）"

# ——— 多分类-多用户组映射（D2）———
category_group_mappings:
  type: string
  default: ""
  description: "多分类对应不同用户组的映射配置，格式：category_id:group_id|category_id:group_id，例如：12:5|15:8。留空则统一使用 enabled_groups 设置"
