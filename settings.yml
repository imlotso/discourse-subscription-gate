enabled_categories:
  type: list
  list_type: category
  default: ""
  description: "需要订阅才能查看完整内容的分类"
enabled_tags:
  type: list
  list_type: tag
  default: ""
  description: "需要订阅才能查看内容的标签"
enabled_groups:
  type: list
  list_type: group
  default: ""
  description: "需要加入的用户组才能查看内容，留空则允许所有已登录用户"

enabled_topic_ids:
  type: string
  default: ""
  description: "需要订阅才能查看的话题 ID 列表，用 | 分隔，例如：103|105|110"

enabled_topic_id_ranges:
  type: string
  default: ""
  description: "需要订阅才能查看的话题 ID 区间，格式：start-end，多个区间用 | 分隔，例如：100-120|200-220"

exempt_topic_ids:
  type: string
  default: ""
  description: "免密白名单话题 ID，配置后无视订阅限制直接开放，用 | 分隔，例如：50|60"

content_visible_height:
  type: string
  default: "50"
  description: "帖子内容在遮盖下可见的高度百分比（相对视口高度 vh），默认 50"

top_content_overlay_opacity:
  type: string
  default: "55"
  description: "上方正文区域遮盖透明度百分比（0-100），例如 55 表示 0.55"

toc_dim_opacity:
  type: string
  default: "40"
  description: "遮盖激活时，右侧目录的透明度百分比，默认 40%"

gate_overlay_bg_color:
  type: string
  default: "#EAF3FB"
  description: "遮盖底部面板的背景色"

heading_text_custom:
  type: string
  default: "此内容仅限订阅会员查看"
  description: "遮盖标题文字"

subheading_text_custom:
  type: string
  default: "订阅后即可阅读全部内容。"
  description: "遮盖副标题（未登录用户看到）"

group_subheading_text_custom:
  type: string
  default: "您需要有效订阅才能查看此内容。"
  description: "遮盖副标题（已登录但未订阅用户看到）"

signup_cta_label_custom:
  type: string
  default: "立即订阅"
  description: "未登录用户看到的主按钮文案"

group_cta_label_custom:
  type: string
  default: "前往订阅"
  description: "已登录未订阅用户看到的主按钮文案"

login_cta_label_custom:
  type: string
  default: "已有账户？登录"
  description: "未登录用户看到的次级登录链接文案"

info_button_label_custom:
  type: string
  default: "订阅说明"
  description: "次按钮「订阅说明」的文案"

info_topic_id:
  type: string
  default: ""
  description: "「订阅说明」按钮跳转到的内部话题 ID；填写后未登录与已登录未订阅用户的主按钮下方均显示「订阅说明」文字按钮，留空则不显示该按钮"

subscription_page_url:
  type: string
  default: "/s"
  description: "订阅页面 URL，CTA 按钮跳转目标"

subscription_product_id:
  type: string
  default: ""
  description: "若填写 Stripe Product ID，CTA 按钮将直接跳转至 /s/:product_id"

redirect_after_login:
  type: string
  default: "true"
  description: "用户登录后是否自动跳回触发遮盖的原帖子页面"

skip_gate_for_logged_in:
  type: string
  default: "false"
  description: "是否允许所有已登录用户绕过遮盖"

category_group_mappings:
  type: string
  default: ""
  description: "多分类对应不同用户组的映射配置，格式：category_id:group_id|category_id:group_id"

group_custom_button_link:
  type: string
  default: ""
  description: "[已弃用] 已登录未订阅用户自定义按钮跳转链接，保留以兼容官方 QUnit 测试"
