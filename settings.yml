enabled_categories:
  type: list
  list_type: category
  default: ""
  description: "Choose which categories that users need to sign up for."
enabled_tags:
  type: list
  list_type: tag
  default: ""
  description: "Choose which tags that users need to sign up for. The default is 'gated'."
enabled_groups:
  type: list
  list_type: group
  default: ""
  description: "Choose which groups users need to be a member of to view the content. Leave empty to allow all logged-in users."
group_custom_button_link:
  type: string
  default: ""
  description: "Optionally specify a custom URL for the call-to-action button for groups."

# 新增：topic id 控制
enabled_topic_ids:
  type: string
  default: ""
  description: "指定 topic id 列表，使用 | 分隔，例如：103|105|110"

enabled_topic_id_ranges:
  type: string
  default: ""
  description: "指定 topic id 区间，格式：start-end，多个区间用 | 分隔，例如：100-120|200-220"

info_topic_id:
  type: string
  default: ""
  description: "次按钮「查看订阅说明」跳转的目标 topic id"

top_content_overlay_opacity:
  type: string
  default: "55"
  description: "上方正文区域遮罩透明度百分比（0-100），例如 55 表示 0.55"

# 遮罩内容展示
content_visible_height:
  type: string
  default: "50"
  description: "帖子内容在遮罩下可见的高度百分比（相对视口高度 vh），默认 50"

show_subscription_plans:
  type: string
  default: "true"
  description: "是否在遮罩 CTA 区域展示订阅计划列表"

plan_display_product_id:
  type: string
  default: ""
  description: "Discourse Subscriptions 产品 ID，用于展示价格"

toc_dim_opacity:
  type: string
  default: "40"
  description: "遮罩激活时，右侧目录的透明度百分比，默认 40%"

gate_overlay_bg_color:
  type: string
  default: "#EAF3FB"
  description: "遮罩背景色"

# 文案配置
heading_text_custom:
  type: string
  default: "此内容仅限订阅会员查看"
  description: "遮罩标题文字"

subheading_text_custom:
  type: string
  default: "订阅后即可阅读全部课程内容。"
  description: "遮罩副标题（未登录用户看到）"

group_subheading_text_custom:
  type: string
  default: "您需要有效订阅才能查看此内容。"
  description: "遮罩副标题（已登录但未订阅用户看到）"

signup_cta_label_custom:
  type: string
  default: "立即订阅"
  description: "未登录用户看到的主按钮文案"

group_cta_label_custom:
  type: string
  default: "前往订阅"
  description: "已登录未订阅用户看到的主按钮文案"

login_cta_label_custom:
  type: string
  default: "已有账户？登录"
  description: "未登录用户看到的次级登录链接文案"

info_button_label_custom:
  type: string
  default: "查看订阅说明"
  description: "次按钮「查看订阅说明」的文案"

# 订阅跳转
subscription_page_url:
  type: string
  default: "/s"
  description: "订阅页面 URL，CTA 按钮跳转目标"

subscription_product_id:
  type: string
  default: ""
  description: "若填写 Stripe Product ID，CTA 按钮将直接跳转至 /s/:product_id"

redirect_after_login:
  type: string
  default: "true"
  description: "用户登录后是否自动跳回触发遮罩的原帖子页面"

skip_gate_for_logged_in:
  type: string
  default: "false"
  description: "C1 开关：是否允许所有已登录用户绕过遮罩"

# 多分类-多用户组映射
category_group_mappings:
  type: string
  default: ""
  description: "多分类对应不同用户组的映射配置，格式：category_id:group_id|category_id:group_id"
